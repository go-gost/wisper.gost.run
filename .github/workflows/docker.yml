name: Docker

# Auto-builds and pushes the landing-page image to Docker Hub.
# Derived from the `docker` job in go-gost/wisper's CI, stripped down to just
# the image build (this repo is a static site — no Go lint/test/release).
#
# Triggers:
#   - push to main  → tags the image `main` + `latest`
#   - v* tag        → tags the image with the bare semver (e.g. v1.2.3 → 1.2.3)
#
# Requires repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: gogost/wisper-landing
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c7a7e944ae62b3e17d2b600130 # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4b3a3d33f178e8 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
